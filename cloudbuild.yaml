steps:
# --- Step 1: Build and push the backend Docker image ---
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/ailbee/ailbee-backend', '.']
  dir: 'ailbee-cloud-run' # Specifies that this step runs in the backend's directory

# --- Step 2: Push the image to Google Container Registry ---
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/ailbee/ailbee-backend']

# --- Step 3: Deploy the new image to Cloud Run ---
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'ailbee-backend' # The name of the Cloud Run service
    - '--image=gcr.io/ailbee/ailbee-backend'
    - '--region=us-central1'
    - '--platform=managed'
    - '--allow-unauthenticated' # Allows invocation from the frontend app
    - '--service-account=ailbee-cloud-run@ailbee.iam.gserviceaccount.com' # Service account FOR the running service
    - '--min-instances=0'
    - '--max-instances=100'

# --- Step 4: Build the Flutter web app ---
- name: 'cirrusci/flutter'
  args: ['flutter', 'build', 'web']
  dir: 'ailbee_frontend'

# --- Step 5: Deploy to Firebase Hosting ---
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    firebase deploy --project ailbee --only hosting

# --- Build Configuration ---

# List of images to be pushed to the registry
images:
- 'gcr.io/ailbee/ailbee-backend'

# Specify the bucket for build logs
logsBucket: 'gs://ailbee_cloudbuild/logs'
options:
  logging: GCS_ONLY

# --- SECURITY FIX ---
# Explicitly specify the service account for the Cloud Build process itself,
# as required by the organization's security policy.
serviceAccount: 'projects/ailbee/serviceAccounts/ailbee-cloud-build@ailbee.iam.gserviceaccount.com'
