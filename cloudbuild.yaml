steps:
  # 1. Сборка контейнера через Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/ailbee-enterprise-hub:${_TAG}', 
      '.'
    ]

  # 2. Публикация образа в реестр
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'gcr.io/$PROJECT_ID/ailbee-enterprise-hub:${_TAG}'
    ]

  # 3. Деплой в бессерверную среду Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ailbee-enterprise-hub'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ailbee-enterprise-hub:${_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/ailbee-enterprise-hub:${_TAG}'

# Резервный тег для ручного запуска, если нет автоматического COMMIT_SHA
substitutions:
  _TAG: 'latest'

# Логирование напрямую в Cloud Logging (для обхода ограничений безопасности вашей организации)
options:
  logging: CLOUD_LOGGING_ONLY
  