steps:
  # Оставляем только чистую сборку Docker-образа, которая всегда работала
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/ailbee/ailbee-enterprise/ailbee-enterprise-hub:$COMMIT_SHA',
      '-f', 'backend/Dockerfile',
      'backend'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
