steps:
  # Шаг 1: Сборка Docker-образа бэкенда
  - name: 'gcloudsdk/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build -t gcr.io/$PROJECT_ID/ailbee-backend:$COMMIT_SHA -t gcr.io/$PROJECT_ID/ailbee-backend:latest .

  # Шаг 2: Отправка собранного образа в Google Container Registry (GCR)
  - name: 'gcloudsdk/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push gcr.io/$PROJECT_ID/ailbee-backend:$COMMIT_SHA && \
        docker push gcr.io/$PROJECT_ID/ailbee-backend:latest

  # Шаг 3: Автоматический деплой нового образа в Cloud Run
  - name: 'google/cloud-sdk'
    args:
      - 'run'
      - 'deploy'
      - 'ailbee-backend'            # Имя вашего сервиса в Cloud Run
      - '--image=gcr.io/$PROJECT_ID/ailbee-backend:$COMMIT_SHA'
      - '--region=us-central1'       # Укажите ваш регион (например, us-central1)
      - '--platform=managed'
      - '--allow-unauthenticated'    # Если API публичное (хрон защищен токеном внутри кода)

images:
  # Фиксируем, какие образы считать результатом успешной сборки
  - 'gcr.io/$PROJECT_ID/ailbee-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ailbee-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY        # Логи будут идти напрямую в Cloud Logging
